name: Backend CI and CD

on:
  push:
    branches:
      - main
  pull_request:

env:
  REGISTRY: ghcr.io
  HETZNER_SSH_ADDRESS: ${{ secrets.HETZNER_SSH_ADDRESS }}
  HETZNER_SSH_ENDPOINT: ${{ secrets.HETZNER_SSH_USER }}@${{ secrets.HETZNER_SSH_ADDRESS }}

concurrency:
  group: ${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    runs-on: blacksmith-8vcpu-ubuntu-2404

    strategy:
      matrix:
        image:
          - name: backend
            target: production-blog
          - name: runner-manager
            target: production-runner-manager
          - name: runner-worker
            target: production-runner-worker

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: useblacksmith/setup-go@v6
        with:
          go-version: '1.26.x'

      - name: Run unit tests
        run: |
          go test ./... -v -race -cover

      - name: Build ${{ matrix.image.name }} image
        uses: ./.github/actions/docker-build
        with:
          context: .
          dockerfile: Dockerfile
          image-name: ${{ matrix.image.name }}
          target: ${{ matrix.image.target }}
          push: false
          container-registry: ${{ env.REGISTRY }}

  build-and-push-images:
    runs-on: blacksmith-8vcpu-ubuntu-2404

    if: ${{ format('refs/heads/{0}', github.event.repository.default_branch) == github.ref }}

    permissions:
      packages: write
      contents: read

    needs:
      - ci

    strategy:
      matrix:
        image:
          - name: backend
            target: production-blog
          - name: runner-manager
            target: production-runner-manager
          - name: runner-worker
            target: production-runner-worker

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build and push ${{ matrix.image.name }} image
        uses: ./.github/actions/docker-build
        with:
          context: .
          dockerfile: Dockerfile
          image-name: ${{ matrix.image.name }}
          target: ${{ matrix.image.target }}
          push: true
          container-registry: ${{ env.REGISTRY }}
          container-registry-username: ${{ github.actor }}
          container-registry-password: ${{ secrets.GITHUB_TOKEN }}

  deploy:
    runs-on: blacksmith-4vcpu-ubuntu-2404

    if: ${{ format('refs/heads/{0}', github.event.repository.default_branch) == github.ref }}

    permissions:
      packages: read
      contents: read

    needs:
      - build-and-push-images

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy services
        run: |
          # Setup ssh key
          echo '${{ secrets.HETZNER_SSH_PRIVATE_KEY }}' > ~/hetzner-key.pem
          chmod 400 ~/hetzner-key.pem

          mkdir -p ~/.ssh
          ssh-keyscan -H $HETZNER_SSH_ADDRESS >> ~/.ssh/known_hosts 2>/dev/null

          # Ensure remote directory exists
          ssh -q -i ~/hetzner-key.pem -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null $HETZNER_SSH_ENDPOINT << 'EOF' >/dev/null 2>&1
            mkdir -p /tmp/deployment_backend
            chown ${{ secrets.HETZNER_SSH_USER }}:${{ secrets.HETZNER_SSH_USER }} /tmp/deployment_backend

          EOF

          # Copy files
          scp -q -i ~/hetzner-key.pem -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -r ./compose.*.yaml $HETZNER_SSH_ENDPOINT:/tmp/deployment_backend/ 2>/dev/null

          # Connect and deploy services
          ssh -q -i ~/hetzner-key.pem -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null $HETZNER_SSH_ENDPOINT << 'EOF' >/dev/null 2>&1
            echo '${{ secrets.GITHUB_TOKEN }}' | docker login ghcr.io -u ${{ github.actor }} --password-stdin > /dev/null 2>&1

            export MONGO_USERNAME='${{ secrets.MONGO_USERNAME }}'
            export MONGO_PASSWORD='${{ secrets.MONGO_PASSWORD }}'

            export BACKEND_NATS_URL='${{ secrets.BACKEND_NATS_URL }}'
            export BACKEND_PRIVATE_KEY='${{ secrets.BACKEND_PRIVATE_KEY }}'

            export BACKEND_MONGO_HOST='mongodb'
            export BACKEND_MONGO_PORT='27017'
            export BACKEND_MONGO_SCHEME='mongodb'
            export BACKEND_MONGO_DATABASE_NAME='${{ secrets.BACKEND_MONGO_DATABASE_NAME }}'
            export BACKEND_MONGO_USERNAME='${{ secrets.MONGO_USERNAME }}'
            export BACKEND_MONGO_PASSWORD='${{ secrets.MONGO_PASSWORD }}'

            export BACKEND_MAIL_SMTP_PASSWORD='${{ secrets.BACKEND_MAIL_SMTP_PASSWORD }}'
            export BACKEND_MAIL_SMTP_HOST='${{ secrets.BACKEND_MAIL_SMTP_HOST }}'
            export BACKEND_MAIL_SMTP_FROM='${{ secrets.BACKEND_MAIL_SMTP_FROM }}'
            export BACKEND_MAIL_SMTP_USERNAME='${{ secrets.BACKEND_MAIL_SMTP_USERNAME }}'
            export BACKEND_MAIL_SMTP_PORT='${{ secrets.BACKEND_MAIL_SMTP_PORT }}'

            export BACKEND_S3_ENDPOINT='${{ secrets.BACKEND_S3_ENDPOINT }}'
            export BACKEND_S3_SECRET_KEY='${{ secrets.BACKEND_S3_SECRET_KEY }}'
            export BACKEND_S3_ACCESS_KEY='${{ secrets.BACKEND_S3_ACCESS_KEY }}'
            export BACKEND_S3_USE_SSL='${{ secrets.BACKEND_S3_USE_SSL }}'
            export BACKEND_S3_BUCKET_NAME='${{ secrets.BACKEND_S3_BUCKET_NAME }}'

            export BACKEND_DOCKER_HOST='${{ secrets.BACKEND_DOCKER_HOST }}'

            export APP_IMAGE='${{ secrets.APP_IMAGE }}'
            export RUNNER_MANAGER_IMAGE='${{ secrets.RUNNER_MANAGER_IMAGE }}'
            export RUNNER_WORKER_IMAGE='${{ secrets.RUNNER_WORKER_IMAGE }}'

            # Run Docker Compose
            cd /tmp/deployment_backend/

            docker compose -f compose.app.yaml --project-name app up --pull always --detach > /dev/null 2>&1
            docker compose -f compose.runner-manager.yaml --project-name runner-manager up --pull always --detach > /dev/null 2>&1
            docker compose -f compose.runner-worker-01.yaml --project-name runner-worker-01 up --pull always --detach > /dev/null 2>&1
            docker compose -f compose.runner-worker-02.yaml --project-name runner-worker-02 up --pull always --detach > /dev/null 2>&1
            docker compose -f compose.runner-worker-03.yaml --project-name runner-worker-03 up --pull always --detach > /dev/null 2>&1

            rm -rf /tmp/deployment_backend
          EOF
