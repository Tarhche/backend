# app placement
x-app: &app
  build:
    context: .
    dockerfile: Dockerfile
  restart: unless-stopped
  depends_on:
    - mongodb
    - nats
    - minio
    - minio_configure
    - docker
    - mailserver
    - grafana
  volumes:
    - ./:/opt/app

services:
  app:
    <<: *app
    build:
      target: develop-blog
    ports:
      - "8000:80"
    environment:
      WEB_URL: ${WEB_URL}
      PRIVATE_KEY: ${PRIVATE_KEY}
      S3_ENDPOINT: ${S3_ENDPOINT}
      S3_ACCESS_KEY: ${S3_ACCESS_KEY}
      S3_SECRET_KEY: ${S3_SECRET_KEY}
      S3_BUCKET_NAME: ${S3_BUCKET_NAME}
      S3_USE_SSL: ${S3_USE_SSL}
      MONGO_SCHEME: ${MONGO_SCHEME}
      MONGO_USERNAME: ${MONGO_USERNAME}
      MONGO_PASSWORD: ${MONGO_PASSWORD}
      MONGO_HOST: ${MONGO_HOST}
      MONGO_PORT: ${MONGO_PORT}
      MONGO_DATABASE_NAME: ${MONGO_DATABASE_NAME}
      MAIL_SMTP_FROM: ${MAIL_SMTP_FROM}
      MAIL_SMTP_USERNAME: ${MAIL_SMTP_USERNAME:-}
      MAIL_SMTP_PASSWORD: ${MAIL_SMTP_PASSWORD:-}
      MAIL_SMTP_HOST: ${MAIL_SMTP_HOST}
      MAIL_SMTP_PORT: ${MAIL_SMTP_PORT}
      NATS_URL: ${NATS_URL}
      OTEL_EXPORTER_OTLP_INSECURE: ${OTEL_EXPORTER_OTLP_INSECURE}
      OTEL_EXPORTER_OTLP_PROTOCOL: ${OTEL_EXPORTER_OTLP_PROTOCOL}
      OTEL_RESOURCE_ATTRIBUTES: ${OTEL_RESOURCE_ATTRIBUTES}
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT}
      OTEL_EXPORTER_OTLP_HEADERS: ${OTEL_EXPORTER_OTLP_HEADERS:-}
      PROFILING_ENABLED: ${PROFILING_ENABLED:-true}

  runner-manager:
    <<: *app
    build:
      target: develop-runner-manager
    ports:
      - "8020:80"
    environment:
      MONGO_SCHEME: ${MONGO_SCHEME}
      MONGO_USERNAME: ${MONGO_USERNAME}
      MONGO_PASSWORD: ${MONGO_PASSWORD}
      MONGO_HOST: ${MONGO_HOST}
      MONGO_PORT: ${MONGO_PORT}
      MONGO_DATABASE_NAME: ${MONGO_DATABASE_NAME}
      NATS_URL: ${NATS_URL}
      OTEL_EXPORTER_OTLP_INSECURE: ${OTEL_EXPORTER_OTLP_INSECURE}
      OTEL_EXPORTER_OTLP_PROTOCOL: ${OTEL_EXPORTER_OTLP_PROTOCOL}
      OTEL_RESOURCE_ATTRIBUTES: ${OTEL_RESOURCE_ATTRIBUTES}
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT}
      OTEL_EXPORTER_OTLP_HEADERS: ${OTEL_EXPORTER_OTLP_HEADERS:-}
      PROFILING_ENABLED: ${PROFILING_ENABLED:-true}
  runner-worker-01:
    <<: *app
    build:
      target: develop-runner-worker
    ports:
      - "8040:80"
    environment:
      RUNNER_WORKER_NAME: runner-worker-01
      NATS_URL: ${NATS_URL}
      DOCKER_HOST: ${BACKEND_DOCKER_HOST}
      OTEL_EXPORTER_OTLP_INSECURE: ${OTEL_EXPORTER_OTLP_INSECURE}
      OTEL_EXPORTER_OTLP_PROTOCOL: ${OTEL_EXPORTER_OTLP_PROTOCOL}
      OTEL_RESOURCE_ATTRIBUTES: ${OTEL_RESOURCE_ATTRIBUTES}
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT}
      OTEL_EXPORTER_OTLP_HEADERS: ${OTEL_EXPORTER_OTLP_HEADERS:-}
      PROFILING_ENABLED: ${PROFILING_ENABLED:-true}
  runner-worker-02:
    <<: *app
    build:
      target: develop-runner-worker
    ports:
      - "8041:80"
    environment:
      RUNNER_WORKER_NAME: runner-worker-02
      NATS_URL: ${NATS_URL}
      DOCKER_HOST: ${BACKEND_DOCKER_HOST}
      OTEL_EXPORTER_OTLP_INSECURE: ${OTEL_EXPORTER_OTLP_INSECURE}
      OTEL_EXPORTER_OTLP_PROTOCOL: ${OTEL_EXPORTER_OTLP_PROTOCOL}
      OTEL_RESOURCE_ATTRIBUTES: ${OTEL_RESOURCE_ATTRIBUTES}
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT}
      OTEL_EXPORTER_OTLP_HEADERS: ${OTEL_EXPORTER_OTLP_HEADERS:-}
      PROFILING_ENABLED: ${PROFILING_ENABLED:-true}
  runner-worker-03:
    <<: *app
    build:
      target: develop-runner-worker
    ports:
      - "8042:80"
    environment:
      RUNNER_WORKER_NAME: runner-worker-03
      NATS_URL: ${NATS_URL}
      DOCKER_HOST: ${BACKEND_DOCKER_HOST}
      OTEL_EXPORTER_OTLP_INSECURE: ${OTEL_EXPORTER_OTLP_INSECURE}
      OTEL_EXPORTER_OTLP_PROTOCOL: ${OTEL_EXPORTER_OTLP_PROTOCOL}
      OTEL_RESOURCE_ATTRIBUTES: ${OTEL_RESOURCE_ATTRIBUTES}
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT}
      OTEL_EXPORTER_OTLP_HEADERS: ${OTEL_EXPORTER_OTLP_HEADERS:-}
      PROFILING_ENABLED: ${PROFILING_ENABLED:-true}

  mongodb:
    image: mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - ./tmp/mongodb/db:/data/db
      - ./tmp/mongodb/configdb:/data/configdb
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USERNAME}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD}

  mongodashboard:
    image: mongo-express
    restart: unless-stopped
    depends_on:
      - mongodb
    ports:
      - "8081:8081"
    environment:
      ME_CONFIG_BASICAUTH_USERNAME: username
      ME_CONFIG_BASICAUTH_PASSWORD: password
      ME_CONFIG_MONGODB_URL: ${MONGO_SCHEME}://${MONGO_USERNAME}:${MONGO_PASSWORD}@${MONGO_HOST}:${MONGO_PORT}

  minio:
    image: minio/minio
    restart: unless-stopped
    ports:
      - "9100:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_KEY}
    command: ["server", "/data", "--console-address", ":9001"]

  minio_configure:
    image: minio/mc
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      mc config host add minio http://minio:9000 ${S3_ACCESS_KEY} ${S3_SECRET_KEY};
      mc mb minio/blog;"

  nats:
    image: nats:2.12
    command: ["--jetstream", "--http_port", "8222", "--port", "4222", "--store_dir", "/data"]
    ports:
      - "4222:4222" # client port
      - "6222:6222" # cluster post
      - "8222:8222" # HTTP monitoring port
    volumes:
      - ./tmp/nats:/data

  natsdashboard:
    image: ghcr.io/nats-nui/nui:0.7
    depends_on:
      - nats
    ports:
      - "8082:31311"

  docker:
    image: docker:28-dind
    restart: unless-stopped
    privileged: true
    ports:
      - "2375:2375"
    environment:
      DOCKER_TLS_CERTDIR: "" # disable certs
    # dockerd's own Prometheus metrics endpoint on 0.0.0.0:9323
    command: ["--metrics-addr=0.0.0.0:9323", "--experimental"]

  portainer:
    image: portainer/portainer-ce
    restart: unless-stopped
    depends_on:
      - docker
    ports:
      - "9200:9000"
      - "9443:9443"
    command: >
      --admin-password="$$2a$$12$$4xcOa82Ni5rjgQF.v.JWi.i71OyUm3fwmfWiumgJHIAPGU.uOw3qu"
    # username: admin
    # password: admin-password
    # standalone docker API url: docker:2375

  mailserver:
    image: axllent/mailpit
    restart: unless-stopped
    ports:
      - "8092:8025" # web interface
      - "${MAIL_SMTP_PORT:-1025}:1025" # SMTP
    volumes:
      - ./tmp/mailpit/data:/data
    environment:
      MP_MAX_MESSAGES: 5000
      MP_DATABASE: /data/mailpit.db

  grafana:
    image: grafana/otel-lgtm:0.28.0
    restart: unless-stopped
    ports:
      - "3001:3000" # Grafana UI (host 3001: 3000 is already used by WEB_URL's frontend)
      - "4317:4317" # OTLP gRPC
      - "4318:4318" # OTLP HTTP
    volumes:
      - ./tmp/grafana-lgtm:/data
      - ./prometheus.yaml:/otel-lgtm/prometheus.yaml:ro
    depends_on:
      - nats-exporter
      - mongodb-exporter

  nats-exporter:
    image: natsio/prometheus-nats-exporter:0.19.1
    restart: unless-stopped
    depends_on:
      - nats
    command: ["-varz", "-connz", "-routez", "-subz", "-jsz", "all", "http://nats:8222"]

  mongodb-exporter:
    image: percona/mongodb_exporter:0.51.0
    restart: unless-stopped
    depends_on:
      - mongodb
    environment:
      MONGODB_URI: ${MONGO_SCHEME}://${MONGO_USERNAME}:${MONGO_PASSWORD}@${MONGO_HOST}:${MONGO_PORT}/admin
    command: ["--collector.diagnosticdata", "--collector.dbstats"]
