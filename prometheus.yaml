---
# Mounted over /otel-lgtm/prometheus.yaml in the "grafana" service (compose.yaml).
# Everything above scrape_configs is copied as-is from the grafana/otel-lgtm
# image default - it's what makes the bundled Prometheus accept the OTLP
# metrics our app already sends, so it must stay. scrape_configs is the only
# addition: it pulls server-side metrics from the NATS and MongoDB exporter
# sidecars, which is telemetry those servers can't push via OTLP themselves.
global:
  scrape_native_histograms: true
otlp:
  keep_identifying_resource_attributes: true
  # Recommended attributes to be promoted to labels.
  promote_resource_attributes:
    - service.instance.id
    - service.name
    - service.namespace
    - service.version
    - cloud.availability_zone
    - cloud.region
    - container.name
    - deployment.environment # backward compatibility
    - deployment.environment.name
    - k8s.cluster.name
    - k8s.container.name
    - k8s.cronjob.name
    - k8s.daemonset.name
    - k8s.deployment.name
    - k8s.job.name
    - k8s.namespace.name
    - k8s.node.name
    - k8s.pod.name
    - k8s.replicaset.name
    - k8s.statefulset.name
    - host.name
    - postgresql.database.name
    - postgresql.schema.name
    - postgresql.table.name
    - postgresql.index.name
    - database # used by otelcol/receiver/mongodb
    - kafka.cluster.alias
storage:
  tsdb:
    # A 10min time window is enough because it can easily absorb retries and network delays.
    out_of_order_time_window: 10m

scrape_configs:
  - job_name: nats
    static_configs:
      - targets: ["nats-exporter:7777"]
  - job_name: mongodb
    static_configs:
      - targets: ["mongodb-exporter:9216"]
  - job_name: docker
    static_configs:
      - targets: ["docker:9323"]
